<!-- Sidebar Container -->
<aside
  class="bg-slate-50 border-r border-slate-200 h-screen flex flex-col transition-all duration-300 fixed md:relative z-40 md:translate-x-0"
  [class.w-64]="!isCollapsed()"
  [class.w-20]="isCollapsed()"
  [class.-translate-x-full]="!isMobileOpen"
  [class.translate-x-0]="isMobileOpen">

  <!-- Logo Area -->
  <div class="h-16 flex items-center justify-center border-b border-transparent">
    <div class="flex items-center gap-2 p-4 w-full" [class.justify-center]="isCollapsed()">
      <img src="/assets/logos/taskly-logo.svg" alt="Taskly" class="w-6 h-6">
      @if (!isCollapsed()) {
        <span class="text-title-md font-bold tracking-widest uppercase text-slate-dark truncate">Taskly</span>
      }
    </div>
  </div>

  <!-- Sidebar Navigation Links -->
  <nav class="flex-1 py-4 flex flex-col gap-2 px-3">
    <a routerLink="/project" routerLinkActive="bg-white text-primary shadow-sm"
       class="flex items-center gap-3 p-3 rounded-lg text-slate-medium hover:bg-slate-100 transition-colors cursor-pointer"
       [class.justify-center]="isCollapsed()">
      <svg width="22" height="16" viewBox="0 0 22 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M2 16C1.45 16 0.979167 15.8042 0.5875 15.4125C0.195833 15.0208 0 14.55 0 14V2C0 1.45 0.195833 0.979167 0.5875 0.5875C0.979167 0.195833 1.45 0 2 0H8L10 2H18C18.55 2 19.0208 2.19583 19.4125 2.5875C19.8042 2.97917 20 3.45 20 4H9.175L7.175 2H2V14L4.4 6H21.5L18.925 14.575C18.7917 15.0083 18.5458 15.3542 18.1875 15.6125C17.8292 15.8708 17.4333 16 17 16H2ZM4.1 14H17L18.8 8H5.9L4.1 14ZM4.1 14L5.9 8L4.1 14ZM2 4V2V4Z"
          fill="#003D9B"/>
      </svg>

      @if (!isCollapsed()) {
        <span class="font-medium truncate">Projects</span>
      }
    </a>
    <a routerLink="/project-epics" routerLinkActive="bg-white text-primary shadow-sm"
       class="flex items-center gap-3 p-3 rounded-lg text-slate-medium hover:bg-slate-100 transition-colors cursor-pointer"
       [class.justify-center]="isCollapsed()">
      <svg width="20" height="18" viewBox="0 0 20 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M13 18V15H9V5H7V8H0V0H7V3H13V0H20V8H13V5H11V13H13V10H20V18H13ZM2 2V6V2ZM15 12V16V12ZM15 2V6V2ZM15 6H18V2H15V6ZM15 16H18V12H15V16ZM2 6H5V2H2V6Z"
          fill="#041B3C"/>
      </svg>

      @if (!isCollapsed()) {
        <span class="font-medium truncate">Project Epics</span>
      }
    </a>
    <a routerLink="/project-tasks" routerLinkActive="bg-white text-primary shadow-sm"
       class="flex items-center gap-3 p-3 rounded-lg text-slate-medium hover:bg-slate-100 transition-colors cursor-pointer"
       [class.justify-center]="isCollapsed()">
      <svg width="20" height="16" viewBox="0 0 20 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M3.55 15.075L0 11.525L1.4 10.125L3.525 12.25L7.775 8L9.175 9.425L3.55 15.075ZM3.55 7.075L0 3.525L1.4 2.125L3.525 4.25L7.775 0L9.175 1.425L3.55 7.075ZM11 13.075V11.075H20V13.075H11ZM11 5.075V3.075H20V5.075H11Z"
          fill="#041B3C"/>
      </svg>
      @if (!isCollapsed()) {
        <span class="font-medium truncate">Project Tasks</span>
      }
    </a>
    <a routerLink="/project-members" routerLinkActive="bg-white text-primary shadow-sm"
       class="flex items-center gap-3 p-3 rounded-lg text-slate-medium hover:bg-slate-100 transition-colors cursor-pointer"
       [class.justify-center]="isCollapsed()">
      <svg width="22" height="16" viewBox="0 0 22 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M0 16V13.2C0 12.6333 0.145833 12.1125 0.4375 11.6375C0.729167 11.1625 1.11667 10.8 1.6 10.55C2.63333 10.0333 3.68333 9.64583 4.75 9.3875C5.81667 9.12917 6.9 9 8 9C9.1 9 10.1833 9.12917 11.25 9.3875C12.3167 9.64583 13.3667 10.0333 14.4 10.55C14.8833 10.8 15.2708 11.1625 15.5625 11.6375C15.8542 12.1125 16 12.6333 16 13.2V16H0ZM18 16V13C18 12.2667 17.7958 11.5625 17.3875 10.8875C16.9792 10.2125 16.4 9.63333 15.65 9.15C16.5 9.25 17.3 9.42083 18.05 9.6625C18.8 9.90417 19.5 10.2 20.15 10.55C20.75 10.8833 21.2083 11.2542 21.525 11.6625C21.8417 12.0708 22 12.5167 22 13V16H18ZM8 8C6.9 8 5.95833 7.60833 5.175 6.825C4.39167 6.04167 4 5.1 4 4C4 2.9 4.39167 1.95833 5.175 1.175C5.95833 0.391667 6.9 0 8 0C9.1 0 10.0417 0.391667 10.825 1.175C11.6083 1.95833 12 2.9 12 4C12 5.1 11.6083 6.04167 10.825 6.825C10.0417 7.60833 9.1 8 8 8ZM18 4C18 5.1 17.6083 6.04167 16.825 6.825C16.0417 7.60833 15.1 8 14 8C13.8167 8 13.5833 7.97917 13.3 7.9375C13.0167 7.89583 12.7833 7.85 12.6 7.8C13.05 7.26667 13.3958 6.675 13.6375 6.025C13.8792 5.375 14 4.7 14 4C14 3.3 13.8792 2.625 13.6375 1.975C13.3958 1.325 13.05 0.733333 12.6 0.2C12.8333 0.116667 13.0667 0.0625 13.3 0.0375C13.5333 0.0125 13.7667 0 14 0C15.1 0 16.0417 0.391667 16.825 1.175C17.6083 1.95833 18 2.9 18 4ZM2 14H14V13.2C14 13.0167 13.9542 12.85 13.8625 12.7C13.7708 12.55 13.65 12.4333 13.5 12.35C12.6 11.9 11.6917 11.5625 10.775 11.3375C9.85833 11.1125 8.93333 11 8 11C7.06667 11 6.14167 11.1125 5.225 11.3375C4.30833 11.5625 3.4 11.9 2.5 12.35C2.35 12.4333 2.22917 12.55 2.1375 12.7C2.04583 12.85 2 13.0167 2 13.2V14ZM8 6C8.55 6 9.02083 5.80417 9.4125 5.4125C9.80417 5.02083 10 4.55 10 4C10 3.45 9.80417 2.97917 9.4125 2.5875C9.02083 2.19583 8.55 2 8 2C7.45 2 6.97917 2.19583 6.5875 2.5875C6.19583 2.97917 6 3.45 6 4C6 4.55 6.19583 5.02083 6.5875 5.4125C6.97917 5.80417 7.45 6 8 6Z"
          fill="#041B3C"/>
      </svg>
      @if (!isCollapsed()) {
        <span class="font-medium truncate">Project Members</span>
      }
    </a>
    <a routerLink="/project-details" routerLinkActive="bg-white text-primary shadow-sm"
       class="flex items-center gap-3 p-3 rounded-lg text-slate-medium hover:bg-slate-100 transition-colors cursor-pointer"
       [class.justify-center]="isCollapsed()">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path

          fill="#041B3C"/>
      </svg>
      @if (!isCollapsed()) {
        <span class="font-medium truncate">Project Details</span>
      }
    </a>
  </nav>

  <!-- Bottom Controls -->
  <div class="p-4 flex flex-col gap-2 border-t border-slate-200">

    <!-- Collapse/Expand Arrow Toggle -->
    <button (click)="toggleCollapse()"
            class="flex items-center gap-3 p-3 rounded-lg text-slate-dark hover:bg-slate-100 transition-colors w-full cursor-pointer"
            [class.justify-center]="isCollapsed()">
      <svg class="w-5 h-5 transition-transform" [class.rotate-180]="isCollapsed()" fill="none" stroke="currentColor"
           viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
      </svg>
      @if (!isCollapsed()) {
        <span class="font-medium truncate">Collapse</span>
      }
    </button>

    <!-- Logout Button -->
    <button
      (click)="onLogout()"
      class="flex items-center gap-3 p-3 rounded-lg text-semantic-error hover:bg-red-50 transition-colors w-full cursor-pointer"
      [class.justify-center]="isCollapsed()">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
      </svg>
      @if (!isCollapsed()) {
        <span class="font-medium truncate">Logout</span>
      }
    </button>
  </div>
</aside>

<!-- Mobile Overlay Backdrop -->
@if (isMobileOpen) {
  <div class="fixed inset-0 bg-slate-dark/50 z-30 md:hidden" (click)="closeMobile.emit()"></div>
}
